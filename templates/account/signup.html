{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-2xl border border-gray-100">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">{% trans 'Create Account' %}</h2>
            <p class="mt-2 text-center text-sm text-gray-600">Join us and start making a difference</p>
        </div>
        <form action="{% url 'account_signup' %}" method="post" class="mt-8 space-y-6">
            {% csrf_token %}
            <div class="rounded-md shadow-sm -space-y-px">
                {{ form.as_p }}
            </div>
            <div>
                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">{% trans 'Sign Up' %}</button>
            </div>
        </form>
        <div class="text-center mt-4">
            <p class="text-sm text-gray-600">
                Already have an account?
                <a href="{{ login_url }}" class="font-medium text-text-primary hover:text-text-secondary transition-colors">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
